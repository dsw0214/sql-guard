name: Build Windows Executable

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2025-vs2026
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: ./electron

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Compute build metadata
        id: meta
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $version = $package.version
          $buildDate = Get-Date -Format 'yyyyMMdd'
          $runNumber = $env:GITHUB_RUN_NUMBER
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "build_date=$buildDate" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "run_number=$runNumber" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Windows x64
        run: npm run build-win

      - name: Build Windows portable x64
        run: npm run build-win-portable

      - name: Prepare artifacts
        shell: pwsh
        run: |
          $artifactsDir = "dist/artifacts"
          $installerDir = Join-Path $artifactsDir "installer"
          $portableDir = Join-Path $artifactsDir "portable"
          $version = "${{ steps.meta.outputs.version }}"
          $buildDate = "${{ steps.meta.outputs.build_date }}"
          $runNumber = "${{ steps.meta.outputs.run_number }}"
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          $setup = Get-ChildItem dist -Filter 'sql-guard Setup *.exe' | Select-Object -First 1
          if (-not $setup) {
            throw "NSIS installer not found in dist"
          }

          $portable = Get-ChildItem dist -Filter 'sql-guard *.exe' |
            Where-Object { $_.Name -notlike '*Setup*' } |
            Select-Object -First 1
          if (-not $portable) {
            throw "Portable executable not found in dist"
          }

          $buildTag = "v$version-$buildDate-run$runNumber"
          $installerName = "sql-guard-installer-$buildTag.exe"
          $portableName = "sql-guard-portable-$buildTag.exe"

          Copy-Item $setup.FullName (Join-Path $installerDir $installerName) -Force
          Copy-Item $portable.FullName (Join-Path $portableDir $portableName) -Force

          Get-FileHash "$installerDir/*.exe" -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), $_.Path.Split('\\')[-1] } |
            Set-Content (Join-Path $installerDir 'SHA256SUMS.txt')

          Get-FileHash "$portableDir/*.exe" -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), $_.Path.Split('\\')[-1] } |
            Set-Content (Join-Path $portableDir 'SHA256SUMS.txt')

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: sql-guard-windows-installer-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.build_date }}-run${{ steps.meta.outputs.run_number }}
          path: electron/dist/artifacts/installer/*
          retention-days: 90

      - name: Upload portable artifact
        uses: actions/upload-artifact@v5
        with:
          name: sql-guard-windows-portable-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.build_date }}-run${{ steps.meta.outputs.run_number }}
          path: electron/dist/artifacts/portable/*
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            electron/dist/artifacts/installer/*
            electron/dist/artifacts/portable/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
